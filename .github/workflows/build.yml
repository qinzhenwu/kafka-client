name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libsasl2-dev libcurl4-openssl-dev pkg-config build-essential

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake openssl pkg-config

      - name: Install dependencies (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install cmake strawberryperl -y
          echo "C:\Program Files\CMake\bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (for release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KafkaClient ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 KafkaClient ${{ github.ref_name }}

            ### 系统要求 / System Requirements
            - **macOS**: macOS 10.15 (Catalina) 或更高版本
            - **Windows**: Windows 10 (1803+) 或 Windows 11
            - **Linux**: Ubuntu 18.04+ 或其他主流发行版

            ### Downloads
            - **macOS (Apple Silicon)**: Download the `.dmg` file
            - **Windows**: Download the `.msi` or `.exe` file
            - **Linux**: Download the `.AppImage` or `.deb` file

            ### What's Changed
            See commit history for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJson: true

      - name: Build Tauri app (for test)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run tauri build -- ${{ matrix.args }}